plugin: amazon.aws.aws_ec2

regions:
- us-east-1

hostnames:
  - private-ip-address

filters:
  # This selects only running instances with tag `Environment` tag set to `dev`.
  tag:Name: frontend
  instance-state-name : running

keyed_groups:
# This creates host groups based on architecture.
  - key: tags.name
    separator: ''